name: ETF Dashboard Deploy

on:
  push:
    paths:
      - 'etf_analysis/index.html'   # index.html 푸시될 때만 실행
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify index.html exists
        run: |
          ls -lh etf_analysis/index.html
          echo "✓ index.html 확인 완료"