name: Weekly ETF Dashboard Update

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 오전 6시 KST (= 전날 21:00 UTC)
  workflow_dispatch:        # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly update
        run: python thematic_etf_weekly.py

      - name: Commit & push updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_analysis/index.html
          git diff --cached --quiet || git commit -m "chore: weekly ETF dashboard update $(date +'%Y-%m-%d')"
          git push